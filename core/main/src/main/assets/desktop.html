<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Desktop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #status { text-align: center; padding: 20px; }
        #status h2 { margin-bottom: 10px; color: #fff; }
        #status p { color: #888; margin-bottom: 20px; }
        .btn {
            background: #007acc;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover { background: #005a9e; }
        #novnc-frame {
            display: none;
            width: 100vw;
            height: 100vh;
            border: none;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #333;
            border-top-color: #007acc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="status">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">Starting Desktop...</h2>
        <p id="msg">Launching Xfce desktop environment</p>
        <button class="btn hidden" id="openBtn" onclick="openDesktop()">Open Desktop</button>
        <button class="btn hidden" id="retryBtn" onclick="location.reload()">Retry</button>
    </div>
    <iframe id="novnc-frame" src="" allow="clipboard-read; clipboard-write; fullscreen" allowfullscreen></iframe>

    <script>
        let attempts = 0;

        function openDesktop() {
            document.getElementById('status').style.display = 'none';
            const frame = document.getElementById('novnc-frame');
            frame.style.display = 'block';
            frame.src = 'http://localhost:8080/display/1';
        }

        function checkServer() {
            fetch('http://localhost:8080/displays')
                .then(r => r.json())
                .then(displays => {
                    if (displays && displays.length > 0) {
                        document.getElementById('spinner').classList.add('hidden');
                        document.getElementById('title').textContent = 'Desktop Ready';
                        document.getElementById('msg').textContent = 'Xfce desktop is running';
                        document.getElementById('openBtn').classList.remove('hidden');
                        setTimeout(openDesktop, 500);
                    } else {
                        // Create display
                        fetch('http://localhost:8080/display', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({width: 1280, height: 800})
                        }).catch(() => {}).finally(() => setTimeout(checkServer, 1500));
                    }
                })
                .catch(() => retry());
        }

        function retry() {
            attempts++;
            if (attempts > 60) {
                document.getElementById('spinner').classList.add('hidden');
                document.getElementById('title').textContent = 'Failed to start';
                document.getElementById('msg').textContent = 'Run "desktop" in terminal to start manually';
                document.getElementById('retryBtn').classList.remove('hidden');
                return;
            }
            document.getElementById('msg').textContent = `Waiting for desktop... (${attempts}s)`;
            setTimeout(checkServer, 1000);
        }

        setTimeout(checkServer, 2000);
    </script>
</body>
</html>
